<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMALS</title>
    
    <link rel="icon" type="image/png" href="favicon.png"> 
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="custom-cursor"></div>

    <div class="fog-wrapper">
        <div class="fog-layer layer-1"></div>
        <div class="fog-layer layer-2"></div>
    </div>

    <header class="hero">
        <div class="hero-bg-silhouette"></div> <h1 class="main-title">ANIMALS</h1>
        <div class="scroll-indicator">Aşağı Kaydır</div>
    </header>

    <section class="reveal-section">
        <div class="content-box">
            <h2 class="section-tag">/ HİKAYE</h2>
            <p class="reveal-text">Sessizliğin içinde bir güç, karanlığın kalbinde bir yaşam. Biz sadece izliyoruz; doğanın ham, işlenmemiş ve tehlikeli güzelliğini.</p>
        </div>
    </section>

    <section class="gallery">
        <h2 class="section-tag">/ TÜRLER</h2>
        <div class="card-grid">
            <div class="card">
                <div class="card-image img-1"></div>
                <div class="card-info">
                    <h3 class="glitch-text" data-text="PREDATOR">PREDATOR</h3>
                    <span>Gecenin Sessizliği</span>
                </div>
            </div>
            <div class="card">
                <div class="card-image img-2"></div>
                <div class="card-info">
                    <h3 class="glitch-text" data-text="VENOM">VENOM</h3>
                    <span>Ölümcül Hassasiyet</span>
                </div>
            </div>
            <div class="card">
                <div class="card-image img-3"></div>
                <div class="card-info">
                    <h3 class="glitch-text" data-text="ALPHA">ALPHA</h3>
                    <span>Zirvedeki Düzen</span>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 ANIMALS - Toxic Nature Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
